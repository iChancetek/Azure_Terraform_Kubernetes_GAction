name: Terraform Apply
on:
  push:
    branches:
      - main
    paths:
      - 'terraform-azure-platform/**'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform-azure-platform
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_primary_region: "eastus"
      TF_VAR_secondary_region: "centralus"
      TF_VAR_cluster_name: "aks-prod"
      TF_VAR_cluster_version: "1.30"
      TF_VAR_vnet_cidr: "10.0.0.0/16"
      TF_VAR_min_node_count: "2"
      TF_VAR_max_node_count: "10"
      TF_VAR_enable_failover: "true"
      TF_VAR_enable_private_cluster: "true"
      TF_VAR_enable_zone_redundancy: "false"
      TF_VAR_enable_workload_identity: "true"
      TF_VAR_enable_traffic_manager: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Bootstrap Terraform State Storage
        run: |
          az group create --name ${{ secrets.TF_STATE_RG }} --location eastus
          az storage account create --name ${{ secrets.TF_STATE_SA }} --resource-group ${{ secrets.TF_STATE_RG }} --location eastus --sku Standard_LRS --allow-blob-public-access false || true
          az storage container create --name tfstate --account-name ${{ secrets.TF_STATE_SA }} --auth-mode login || true
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="use_oidc=true"
      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve
