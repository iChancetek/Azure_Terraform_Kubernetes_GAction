apiVersion: v1
kind: Namespace
metadata:
  name: strideiq
  labels:
    name: strideiq
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: strideiq-config
  namespace: strideiq
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: strideiq-sa
  namespace: strideiq
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_WORKLOAD_IDENTITY_CLIENT_ID"
