apiVersion: apps/v1
kind: Deployment
metadata:
  name: strideiq
  namespace: strideiq
  labels:
    app: strideiq
spec:
  replicas: 3
  selector:
    matchLabels:
      app: strideiq
  template:
    metadata:
      labels:
        app: strideiq
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: strideiq-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: strideiq
      containers:
        - name: strideiq
          image: ichancetek/strideiq:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: strideiq-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: strideiq-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-kvname-strideiq
