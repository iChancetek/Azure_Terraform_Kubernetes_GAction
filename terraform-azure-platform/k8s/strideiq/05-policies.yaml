apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: strideiq-hpa
  namespace: strideiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: strideiq
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: strideiq-pdb
  namespace: strideiq
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: strideiq
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: strideiq-network-policy
  namespace: strideiq
spec:
  podSelector:
    matchLabels:
      app: strideiq
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-basic
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
